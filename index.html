<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Runner + Ranking</title>

<style>
body { margin: 0; overflow: hidden; background: #1a1a2e; touch-action: none; }
#info {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: sans-serif;
    pointer-events: none;
    z-index: 100;
}
#score { font-size: 30px; font-weight: bold; margin-bottom: 10px; }

#ranking {
    position: absolute;
    top: 120px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: sans-serif;
}
</style>
</head>

<body>

<div id="info">
    <div id="score">Score: 0</div>
    <div>🦖 T-Rex Escape</div>
</div>

<div id="ranking"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, player, trex;
let obstacles = [];

let score = 0;
let currentLane = 0;
const laneWidth = 3;
let touchStartX = 0;

// ⭐ 상태관리
let gameState = "playing";

const textureLoader = new THREE.TextureLoader();

const playerTexture = textureLoader.load('player_texture.PNG');
const trexTexture = textureLoader.load('trex_texture.PNG');
const treeTexture = textureLoader.load('tree_texture.png');

function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x16213e);
    scene.fog = new THREE.Fog(0x16213e, 20, 70);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 7, 12);
    camera.lookAt(0, 2, -5);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5,10,5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x606060));

    // 바닥
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 1000),
        new THREE.MeshStandardMaterial({ color: 0x0f3460 })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // 플레이어
    player = new THREE.Mesh(
        new THREE.PlaneGeometry(2.8, 4.5),
        new THREE.MeshStandardMaterial({ map: playerTexture, transparent:true })
    );
    player.position.y = 2.2;
    scene.add(player);

    // T-Rex
    trex = new THREE.Mesh(
        new THREE.PlaneGeometry(7, 13),
        new THREE.MeshStandardMaterial({ map: trexTexture, transparent:true })
    );
    trex.position.set(0, -2, 11);
    scene.add(trex);

    // 터치 이동
    window.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
    });

    window.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - touchStartX;

        if(diff < -30 && currentLane > -1) currentLane--;
        else if(diff > 30 && currentLane < 1) currentLane++;
    });

    animate();
    setInterval(spawnTree, 1000);
}

// 장애물
function spawnTree() {
    if(gameState !== "playing") return;

    const tree = new THREE.Mesh(
        new THREE.PlaneGeometry(4, 5),
        new THREE.MeshStandardMaterial({ map: treeTexture, transparent:true })
    );

    const lanes = [-laneWidth, 0, laneWidth];
    tree.position.set(lanes[Math.floor(Math.random()*3)], 2.5, -60);

    scene.add(tree);
    obstacles.push(tree);
}

// 점수 저장 (DB 역할)
function saveScore(score) {
    let scores = JSON.parse(localStorage.getItem("scores")) || [];
    scores.push(score);
    scores.sort((a,b)=>b-a);
    scores = scores.slice(0,5);
    localStorage.setItem("scores", JSON.stringify(scores));
}

// 랭킹 표시
function showRanking() {
    let scores = JSON.parse(localStorage.getItem("scores")) || [];

    let html = "<h2>🏆 RANKING</h2>";

    if(scores.length === 0){
        html += "<div>기록 없음</div>";
    }

    scores.forEach((s,i)=>{
        html += `<div>${i+1}위 : ${s}</div>`;
    });

    document.getElementById("ranking").innerHTML = html;
}

function animate() {
    requestAnimationFrame(animate);

    if(gameState !== "playing"){
        renderer.render(scene, camera);
        return;
    }

    const targetX = currentLane * laneWidth;
    player.position.x += (targetX - player.position.x) * 0.15;

    trex.position.z = Math.max(6, 11 - score/400);

    for(let i = obstacles.length-1; i>=0; i--){
        const obs = obstacles[i];
        obs.position.z += 0.8;

        // 충돌
        if(Math.abs(obs.position.z - player.position.z) < 1 &&
           Math.abs(obs.position.x - player.position.x) < 1.6){

            gameState = "gameover";
            saveScore(score);
            showRanking();
            return;
        }

        // 통과
        if(obs.position.z > 15){
            scene.remove(obs);
            obstacles.splice(i,1);

            score += 10;
            document.getElementById("score").innerText = "Score: " + score;
        }
    }

    renderer.render(scene, camera);
}

init();

window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
