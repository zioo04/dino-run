<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Infinite Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info"><h1>3D RUNNER</h1><p>A / D 키로 이동하세요</p><div id="score">Score: 0</div></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player;
        let obstacles = [];
        let score = 0;
        let currentLane = 0; // -1: 왼쪽, 0: 가운데, 1: 오른쪽
        const laneWidth = 3;

        function init() {
            // 1. 씬 & 카메라 설정
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.Fog(0x111122, 10, 50); // 안개 효과 (템플런 느낌)

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. 조명
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 3. 바닥 (길)
            const floorGeo = new THREE.PlaneGeometry(10, 1000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 4. 플레이어 (캐릭터 대신 입체 상자)
            const playerGeo = new THREE.BoxGeometry(1, 1.5, 1);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 0.75;
            scene.add(player);

            // 입력 감지
            window.addEventListener('keydown', handleInput);
            
            animate();
            setInterval(spawnObstacle, 1000);
        }

        function handleInput(e) {
            if (e.key.toLowerCase() === 'a' && currentLane > -1) currentLane--;
            if (e.key.toLowerCase() === 'd' && currentLane < 1) currentLane++;
        }

        function spawnObstacle() {
            const geo = new THREE.BoxGeometry(1.5, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
            const obs = new THREE.Mesh(geo, mat);
            
            const lanes = [-laneWidth, 0, laneWidth];
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.5, -50);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 캐릭터 이동 부드럽게 업데이트
            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.1;

            // 장애물 이동 및 충돌 체크
            obstacles.forEach((obs, index) => {
                obs.position.z += 0.5; // 장애물이 플레이어 쪽으로 다가옴

                // 충돌 판정
                if (Math.abs(obs.position.z - player.position.z) < 1 && 
                    Math.abs(obs.position.x - player.position.x) < 1) {
                    alert("Game Over! Score: " + Math.floor(score));
                    location.reload();
                }

                // 지나간 장애물 삭제
                if (obs.position.z > 10) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
