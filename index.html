<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mobile Runner: T-Rex Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 100; }
        #score { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <div id="score">Score: 0</div>
        <div style="background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 20px;">
            🦖 티라노를 피해 달아나세요!
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, trex;
        let obstacles = [];
        let score = 0;
        let currentLane = 0; 
        const laneWidth = 3;
        let touchStartX = 0;

        const textureLoader = new THREE.TextureLoader();
        
        // --- [확장자 개별 설정 완료] ---
        // 사람 사진은 대문자 .PNG, 공룡 사진은 소문자 .jpg
        const playerTexture = textureLoader.load('player_texture.PNG'); 
        const trexTexture = textureLoader.load('trex_texture.jpg'); 

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 10, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 12); 
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x505050));

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(12, 1000),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 사람 캐릭터
            const playerGeo = new THREE.PlaneGeometry(2.5, 4);
            const playerMat = new THREE.MeshStandardMaterial({ 
                map: playerTexture,
                transparent: true, // PNG는 투명도 지원
                side: THREE.DoubleSide
            });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 2; 
            scene.add(player);

            // T-Rex
            const trexGeo = new THREE.PlaneGeometry(8, 12);
            const trexMat = new THREE.MeshStandardMaterial({ 
                map: trexTexture,
                side: THREE.DoubleSide
            });
            trex = new THREE.Mesh(trexGeo, trexMat);
            trex.position.y = 4;
            trex.position.z = 9;
            scene.add(trex);

            window.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            }, false);

            window.addEventListener('touchend', (e) => {
                let touchEndX = e.changedTouches[0].clientX;
                let diff = touchEndX - touchStartX;
                if (diff < -30 && currentLane > -1) currentLane--; 
                else if (diff > 30 && currentLane < 1) currentLane++; 
            }, false);

            animate();
            setInterval(spawnObstacle, 1000);
        }

        function spawnObstacle() {
            const obs = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xff4444 })
            );
            const lanes = [-laneWidth, 0, laneWidth];
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 1, -60);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);

            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.2;
            trex.position.x += (player.position.x - trex.position.x) * 0.05;

            trex.position.z = Math.max(25 - (score / 100), 15); 

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += 0.6;

                if (Math.abs(obstacles[i].position.z - player.position.z) < 1.2 && 
                    Math.abs(obstacles[i].position.x - player.position.x) < 1.5) {
                    alert("게임 오버! 점수: " + score);
                    location.reload();
                    return;
                }

                if (obstacles[i].position.z > 15) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            }
            renderer.render(scene, camera);
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
