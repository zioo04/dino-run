<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dino Runner Portfolio</title>

<style>
body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
/* UI 디자인을 조금 더 깔끔하게 다듬었습니다 */
#ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
#score { font-size: 32px; font-weight: bold; letter-spacing: 2px; }
#ranking { position: absolute; top: 120px; width: 100%; text-align: center; color: rgba(255,255,255,0.7); text-shadow: 1px 1px 3px rgba(0,0,0,0.8); pointer-events: none; }
.overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; z-index: 20; }
button { padding: 15px 40px; font-size: 20px; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; background: linear-gradient(45deg, #ff4500, #ff8c00); color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(255,69,0,0.4); transition: 0.3s; }
button:hover { transform: scale(1.1); }
.badge { display: inline-block; padding: 6px 14px; background: rgba(255,255,255,0.1); border-radius: 20px; margin-top: 8px; font-size: 12px; text-transform: uppercase; }
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div class="badge">🦖 Dino Runner Project</div>
</div>

<div id="ranking"></div>

<div id="startScreen" class="overlay">
    <h1 style="font-size: 48px; margin-bottom: 10px;">🦖 DINO RUN</h1>
    <p>Avoid the falling meteors!</p>
    <button onclick="startGame()">START GAME</button>
</div>

<div id="gameOverScreen" class="overlay" style="display:none;">
    <h1 style="color: #ff4500;">GAME OVER</h1>
    <p id="finalScore" style="font-size: 24px;"></p>
    <button onclick="restartGame()">RETRY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, gltfLoader;
let player, obstacles = [];
let score = 0;
let lane = 0;
const laneWidth = 3;
let gameState = "ready";

function init() {
    scene = new THREE.Scene();
    
    const textureLoader = new THREE.TextureLoader();
    textureLoader.load('background.JPG', (texture) => {
        scene.background = texture;
    });

    // 안개를 조금 더 멀리 설정해서 배경 유성우가 잘 보이게 조절
    scene.fog = new THREE.Fog(0x1a0b2e, 20, 80);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    // 💡 카메라 위치 조정: 공룡이 너무 가깝지 않게, 시야를 더 넓게 확보
    camera.position.set(0, 6, 15);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // 💡 조명 강화: 운석의 텍스처와 빛이 잘 살도록 수정
    scene.add(new THREE.AmbientLight(0xffffff, 0.6)); 
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(5, 15, 10);
    scene.add(light);
    
    // 공룡 주변을 밝혀주는 포인트 라이트
    const pointLight = new THREE.PointLight(0xff4500, 1.5, 20); 
    pointLight.position.set(0, 5, 5);
    scene.add(pointLight);

    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 1000),
        new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.2 })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    gltfLoader = new THREE.GLTFLoader();

    gltfLoader.load('dino.glb', (gltf) => {
        player = gltf.scene;
        player.scale.set(1.5, 1.5, 1.5);
        player.position.y = 0;
        player.rotation.y = Math.PI; // 앞을 보게 설정
        scene.add(player);
    });

    window.addEventListener("touchstart", e => startX = e.touches[0].clientX);
    window.addEventListener("touchend", movePlayer);
    window.addEventListener("keydown",(e)=>{
        if(e.key === "ArrowLeft") lane--;
        if(e.key === "ArrowRight") lane++;
        lane = Math.max(-1, Math.min(1, lane));
    });

    setInterval(spawnObstacle, 900);
    animate();
}

function startGame(){
    if(!player) return; 
    document.getElementById("startScreen").style.display = "none";
    gameState = "playing";
}

function restartGame(){
    location.reload();
}

function spawnObstacle(){
    if(gameState !== "playing") return;

    gltfLoader.load('meteor.glb', (gltf) => {
        const meteorGroup = gltf.scene.clone(); 
        const lanes = [-laneWidth, 0, laneWidth];
        
        meteorGroup.position.set(lanes[Math.floor(Math.random()*3)], 1, -60);
        meteorGroup.scale.set(0.3, 0.3, 0.3); // 존재감 있게 살짝 키움

        // 랜덤 운석 선택 및 빛(Emissive) 강화 로직
        const variants = [];
        meteorGroup.traverse((node) => {
            if (node.isMesh) {
                variants.push(node);
                // 💡 모델 고유의 빛을 2.5배 강하게 만듦
                if(node.material.emissive) {
                    node.material.emissiveIntensity = 2.5; 
                }
                node.material.needsUpdate = true;
            }
        });

        if (variants.length > 0) {
            const randomIndex = Math.floor(Math.random() * variants.length);
            variants.forEach((v, idx) => {
                v.visible = (idx === randomIndex);
                if(v.visible) v.position.set(0, 0, 0); 
            });
        }
        
        scene.add(meteorGroup);
        obstacles.push(meteorGroup);
    });
}

function saveScore(s){
    let data = JSON.parse(localStorage.getItem("dinoScores")) || [];
    data.push(s);
    data.sort((a,b)=>b-a);
    data = data.slice(0,5);
    localStorage.setItem("dinoScores", JSON.stringify(data));
}

function showRanking(){
    let data = JSON.parse(localStorage.getItem("dinoScores")) || [];
    let html = "<h3>🏆 TOP 5</h3>";
    data.forEach((s,i)=>{
        html += `<div>${i+1}st - ${s}</div>`;
    });
    document.getElementById("ranking").innerHTML = html;
}

function animate(){
    requestAnimationFrame(animate);

    if(gameState !== "playing"){
        renderer.render(scene, camera);
        return;
    }

    if(player) {
        player.position.x += ((lane * laneWidth) - player.position.x) * 0.15;
    }

    for(let i=obstacles.length-1; i>=0; i--){
        let o = obstacles[i];
        o.position.z += 0.85; // 속도를 살짝 올림

        // 충돌 판정 (범위 0.5로 살짝 넉넉하게 조정)
        if(player && Math.abs(o.position.z - player.position.z) < 0.5 &&
           Math.abs(o.position.x - player.position.x) < 0.5){

            gameState = "over";
            saveScore(score);
            showRanking();
            document.getElementById("finalScore").innerText = "Final Score: " + score;
            document.getElementById("gameOverScreen").style.display = "flex";
            return;
        }

        if(o.position.z > 20){
            scene.remove(o);
            obstacles.splice(i,1);
            score += 10;
            document.getElementById("score").innerText = "Score: " + score;
        }
    }

    renderer.render(scene, camera);
}

let startX = 0;
function movePlayer(e){
    let diff = e.changedTouches[0].clientX - startX;
    if(diff > 30) lane++;
    else if(diff < -30) lane--;
    lane = Math.max(-1, Math.min(1, lane));
}

init();
showRanking();

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
