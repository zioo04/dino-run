<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Jurassic Escape</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; background: #222; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #444; }
    </style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 400,
        height: 600,
        physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
        scene: { preload: preload, create: create, update: update }
    };

    let player, tRex, cursors, obstacles, score = 0, scoreText;
    const game = new Phaser.Game(config);

    function preload() {
        // 이미지 경로를 더 안정적인 주소로 변경했습니다.
        this.load.image('ball', 'https://labs.phaser.io/assets/sprites/pangball.png');
        this.load.image('trex', 'https://labs.phaser.io/assets/sprites/phaser-dude.png');
        this.load.image('obs', 'https://labs.phaser.io/assets/sprites/block.png');
    }

    function create() {
        player = this.physics.add.sprite(200, 450, 'ball');
        player.setCollideWorldBounds(true);
        
        tRex = this.add.sprite(200, 550, 'trex');
        tRex.setTint(0xff0000); // 티라노를 빨갛게 표시

        obstacles = this.physics.add.group();
        this.time.addEvent({ delay: 1000, callback: addObstacle, callbackScope: this, loop: true });

        cursors = this.input.keyboard.createCursorKeys();
        scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '20px', fill: '#fff' });

        this.physics.add.overlap(player, obstacles, gameOver, null, this);
    }

    function update() {
        // 모바일 터치 및 키보드 조작
        if (cursors.left.isDown || (this.input.activePointer.isDown && this.input.activePointer.x < 200)) {
            player.setVelocityX(-250);
        } else if (cursors.right.isDown || (this.input.activePointer.isDown && this.input.activePointer.x > 200)) {
            player.setVelocityX(250);
        } else {
            player.setVelocityX(0);
        }

        tRex.x = player.x; // 티라노가 플레이어를 추적하는 효과
        score += 1;
        scoreText.setText('Score: ' + score);
    }

    function addObstacle() {
        let x = Phaser.Math.Between(50, 350);
        let obstacle = obstacles.create(x, -50, 'obs');
        obstacle.setVelocityY(300 + (score / 10));
    }

    function gameOver() {
        this.physics.pause();
        this.add.text(100, 300, 'GAME OVER', { fontSize: '40px', fill: '#ff0000' });
        this.time.delayedCall(2000, () => location.reload(), [], this);
    }
</script>
</body>
</html>
