<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mobile Runner: T-Rex Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; touch-action: none; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 100; }
        #score { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <div id="score">Score: 0</div>
        <div style="background: rgba(255,255,255,0.2); display: inline-block; padding: 5px 15px; border-radius: 20px;">
            🦖티라노사우르스를 피해 질주하세요!
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, trex;
        let obstacles = [];
        let score = 0;
        let currentLane = 0; 
        const laneWidth = 3;
        let touchStartX = 0;

        const textureLoader = new THREE.TextureLoader();
        
        // --- [파일명 대소문자 주의] ---
        const playerTexture = textureLoader.load('player_texture.PNG'); 
        const trexTexture = textureLoader.load('trex_texture.PNG'); 
        const treeTexture = textureLoader.load('tree_texture.png'); // 요청하신 파일명

        function init() {
            scene = new THREE.Scene();
            // 1. 배경색 변경 (진한 네이비/심야의 파란색 느낌)
            scene.background = new THREE.Color(0x16213e); 
            scene.fog = new THREE.Fog(0x16213e, 20, 70);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 12); 
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x606060));

            // 2. 바닥 꾸미기 (격자무늬 추가로 속도감 부여)
            const floorGroup = new THREE.Group();
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 1000),
                new THREE.MeshStandardMaterial({ color: 0x0f3460 })
            );
            floor.rotation.x = -Math.PI / 2;
            floorGroup.add(floor);

            const grid = new THREE.GridHelper(1000, 100, 0x4ecca3, 0x4ecca3);
            grid.position.y = 0.05;
            floorGroup.add(grid);
            scene.add(floorGroup);

            // 플레이어
            const playerMat = new THREE.MeshStandardMaterial({ 
                map: playerTexture, transparent: true, alphaTest: 0.5, side: THREE.DoubleSide 
            });
            player = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 4.5), playerMat);
            player.position.y = 2.25; 
            scene.add(player);

            // 티라노
            const trexMat = new THREE.MeshStandardMaterial({ 
                map: trexTexture, transparent: true, alphaTest: 0.5, side: THREE.DoubleSide 
            });
            trex = new THREE.Mesh(new THREE.PlaneGeometry(7, 13), trexMat);
            trex.position.set(0, -2, 11); 
            trex.rotation.x = -Math.PI / 10; 
            scene.add(trex);

            window.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, false);
            window.addEventListener('touchend', (e) => {
                let diff = e.changedTouches[0].clientX - touchStartX;
                if (diff < -30 && currentLane > -1) currentLane--; 
                else if (diff > 30 && currentLane < 1) currentLane++; 
            }, false);

            animate();
            setInterval(spawnTree, 1100);
        }

        function spawnTree() {
            // 나무 장애물 생성
            const treeMat = new THREE.MeshStandardMaterial({ 
                map: treeTexture,
                transparent: true,
                alphaTest: 0.5,
                side: THREE.DoubleSide
            });
            
            const tree = new THREE.Mesh(new THREE.PlaneGeometry(4, 5.5), treeMat);
            const lanes = [-laneWidth, 0, laneWidth];
            tree.position.set(lanes[Math.floor(Math.random() * 3)], 2.75, -65);
            
            scene.add(tree);
            obstacles.push(tree);
        }

        function animate() {
            requestAnimationFrame(animate);

            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.15;
            trex.position.x += (player.position.x - trex.position.x) * 0.05;

            const chaseDist = Math.max(11 - (score / 400), 6);
            trex.position.z = chaseDist;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += 0.8;

                if (Math.abs(obstacles[i].position.z - player.position.z) < 1.0 && 
                    Math.abs(obstacles[i].position.x - player.position.x) < 1.6) {
                    alert("나무에 걸렸습니다! 최종 점수: " + score);
                    location.reload();
                    return;
                }

                if (obstacles[i].position.z > 15) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            }
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
