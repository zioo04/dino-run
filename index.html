<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>T-Rex Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; text-shadow: 2px 2px 4px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
               color: white; text-align: center; display: none; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #ff4757; color: white; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="msg">
        <h1>GAME OVER!</h1>
        <p>티라노에게 잡혔습니다!</p>
        <button onclick="location.reload()">다시 시작</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, tRex, obstacles = [];
        let score = 0;
        let isGameOver = false;
        let lane = 0; // -1: 왼쪽, 0: 중앙, 1: 오른쪽
        const laneWidth = 2;

        init();
        animate();

        function init() {
            // 1. Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);

            // 2. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 3. Lighting
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 10, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 4. Floor (길)
            const floorGeo = new THREE.PlaneGeometry(10, 1000);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 5. Player (파란색 상자)
            const playerGeo = new THREE.BoxGeometry(1, 1, 1);
            const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 0.5;
            scene.add(player);

            // 6. T-Rex (빨간색 큰 상자 - 뒤에서 쫓아옴)
            const tRexGeo = new THREE.BoxGeometry(2, 3, 2);
            const tRexMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            tRex = new THREE.Mesh(tRexGeo, tRexMat);
            tRex.position.set(0, 1.5, 6);
            scene.add(tRex);

            // 입력 이벤트 (스와이프 대체용 터치/클릭)
            window.addEventListener('touchstart', handleTouch);
            window.addEventListener('keydown', (e) => {
                if(e.key === "ArrowLeft") moveLane(-1);
                if(e.key === "ArrowRight") moveLane(1);
            });
        }

        function handleTouch(e) {
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) moveLane(-1);
            else moveLane(1);
        }

        function moveLane(dir) {
            lane = Math.max(-1, Math.min(1, lane + dir));
            player.position.x = lane * laneWidth;
        }

        function spawnObstacle() {
            if (Math.random() < 0.05) {
                const obsGeo = new THREE.BoxGeometry(1, 1, 1);
                const obsMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
                const obs = new THREE.Mesh(obsGeo, obsMat);
                const randomLane = Math.floor(Math.random() * 3) - 1;
                obs.position.set(randomLane * laneWidth, 0.5, -50);
                scene.add(obs);
                obstacles.push(obs);
            }
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            // 장애물 생성 및 이동
            spawnObstacle();
            obstacles.forEach((obs, index) => {
                obs.position.z += 0.5; // 장애물이 다가옴
                
                // 충돌 감지
                if (obs.position.z > -0.5 && obs.position.z < 0.5 && Math.abs(obs.position.x - player.position.x) < 0.5) {
                    gameOver();
                }

                // 화면 밖 제거
                if (obs.position.z > 10) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                }
            });

            // 티라노가 위협적으로 움직임
            tRex.position.x = player.position.x * 0.5;
            tRex.position.y = 1.5 + Math.sin(Date.now() * 0.01) * 0.2;

            renderer.render(scene, camera);
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('msg').style.display = 'block';
        }

        // 창 크기 조절 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
