<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mobile Runner: T-Rex Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 100; }
        #score { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <div id="score">Score: 0</div>
        <div style="background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 20px;">
            🦖 티라노를 피해 달아나세요!
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, trex;
        let obstacles = [];
        let score = 0;
        let currentLane = 0; 
        const laneWidth = 3;
        let touchStartX = 0;

        const textureLoader = new THREE.TextureLoader();
        const playerTexture = textureLoader.load('player_texture.PNG'); 
        const trexTexture = textureLoader.load('trex_texture.jpg'); 

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.Fog(0x050510, 20, 70);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // 카메라 위치 고정
            camera.position.set(0, 8, 18); 
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x606060));

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 1000),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 플레이어
            const playerGeo = new THREE.PlaneGeometry(2.5, 4);
            const playerMat = new THREE.MeshStandardMaterial({ map: playerTexture, transparent: true, side: THREE.DoubleSide });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 2, 0); 
            scene.add(player);

            // --- [T-Rex 설정 변경] ---
            const trexGeo = new THREE.PlaneGeometry(20, 30); // 크기는 유지
            const trexMat = new THREE.MeshStandardMaterial({ map: trexTexture, transparent: true, side: THREE.DoubleSide });
            trex = new THREE.Mesh(trexGeo, trexMat);
            
            // 공룡의 초기 위치: 카메라(z=18)보다 약간 뒤인 z=10 정도로 설정해야 화면에 보입니다.
            // y값을 낮춰서 머리 윗부분만 화면 하단에 걸치게 합니다.
            trex.position.set(0, -5, 10); 
            // 공룡을 살짝 앞으로 기울여서 머리가 더 잘 보이게 조절
            trex.rotation.x = -Math.PI / 8; 
            scene.add(trex);

            window.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, false);
            window.addEventListener('touchend', (e) => {
                let diff = e.changedTouches[0].clientX - touchStartX;
                if (diff < -30 && currentLane > -1) currentLane--; 
                else if (diff > 30 && currentLane < 1) currentLane++; 
            }, false);

            animate();
            setInterval(spawnObstacle, 1000);
        }

        function spawnObstacle() {
            const obs = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xff4444 })
            );
            const lanes = [-laneWidth, 0, laneWidth];
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 1, -60);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);

            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.2;
            
            // 공룡도 플레이어를 따라 좌우로 움직임
            trex.position.x += (player.position.x - trex.position.x) * 0.05;
            
            // --- [T-Rex 추격 거리 조절] ---
            // 점수가 오를수록 z값이 작아지며(앞으로 오며) 점점 머리가 크게 보입니다.
            // 초기 z=10에서 점수가 오르면 z=5까지 다가옵니다.
            const dist = Math.max(10 - (score / 500), 5);
            trex.position.z = dist;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += 0.8;
                if (Math.abs(obstacles[i].position.z - player.position.z) < 1.2 && 
                    Math.abs(obstacles[i].position.x - player.position.x) < 1.5) {
                    alert("공룡에게 잡혔습니다! 점수: " + score);
                    location.reload();
                    return;
                }
                if (obstacles[i].position.z > 20) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            }
            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
