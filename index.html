<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mobile Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; }
        #score { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="info">
        <div id="score">Score: 0</div>
        <p>화면을 왼쪽/오른쪽으로 스와이프하세요!</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player;
        let obstacles = [];
        let score = 0;
        let currentLane = 0; 
        const laneWidth = 3;

        // 터치 시작 위치 저장을 위한 변수
        let touchStartX = 0;
        let touchEndX = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.Fog(0x111122, 10, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); // 모바일 고해상도 대응
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // 길 (Road)
            const floorGeo = new THREE.PlaneGeometry(12, 2000);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 플레이어
            const playerGeo = new THREE.BoxGeometry(1.2, 1.8, 1.2);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 0.9;
            scene.add(player);

            // --- 입력 이벤트 등록 ---
            // 1. 키보드 (PC 테스트용)
            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'a') moveLeft();
                if (e.key.toLowerCase() === 'd') moveRight();
            });

            // 2. 터치 이벤트 (아이폰용)
            window.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, false);

            window.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, false);

            animate();
            setInterval(spawnObstacle, 800); // 장애물 생성 속도 조절
        }

        function handleSwipe() {
            const swipeDistance = touchEndX - touchStartX;
            const threshold = 30; // 스와이프 민감도

            if (swipeDistance < -threshold) moveLeft();
            else if (swipeDistance > threshold) moveRight();
        }

        function moveLeft() { if (currentLane > -1) currentLane--; }
        function moveRight() { if (currentLane < 1) currentLane++; }

        function spawnObstacle() {
            const geo = new THREE.BoxGeometry(2, 1.5, 1.5);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff3366 });
            const obs = new THREE.Mesh(geo, mat);
            
            const lanes = [-laneWidth, 0, laneWidth];
            obs.position.set(lanes[Math.floor(Math.random() * 3)], 0.75, -60);
            scene.add(obs);
            obstacles.push(obs);
        }

        function animate() {
            requestAnimationFrame(animate);

            // 부드러운 레인 이동
            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.15;

            // 장애물 처리
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += 0.6; // 다가오는 속도

                // 충돌 감지 (범위 기반)
                if (Math.abs(obs.position.z - player.position.z) < 1.2 && 
                    Math.abs(obs.position.x - player.position.x) < 1.5) {
                    alert("Game Over! Score: " + score);
                    location.reload();
                    return;
                }

                // 화면 뒤로 넘어가면 삭제
                if (obs.position.z > 15) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            }

            renderer.render(scene, camera);
        }

        init();

        // 화면 크기 조정 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
