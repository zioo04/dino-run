<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dino Runner Portfolio</title>

<style>
body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
#ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
#score { font-size: 28px; font-weight: bold; }
#ranking { position: absolute; top: 120px; width: 100%; text-align: center; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
.overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; z-index: 20; }
button { padding: 12px 24px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; background: #ff4500; color: white; font-weight: bold; }
.badge { display: inline-block; padding: 6px 14px; background: rgba(255,255,255,0.15); border-radius: 20px; margin-top: 8px; }
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div class="badge">🦖 Dino Runner Portfolio Project</div>
</div>

<div id="ranking"></div>

<div id="startScreen" class="overlay">
    <h1>🦖 Dino Runner</h1>
    <p>좌우 스와이프: 이동 / 위로 스와이프: 점프</p>
    <button onclick="startGame()">START</button>
</div>

<div id="gameOverScreen" class="overlay" style="display:none;">
    <h1>GAME OVER</h1>
    <p id="finalScore"></p>
    <button onclick="restartGame()">RESTART</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, gltfLoader;
let player, obstacles = [];
let score = 0;
let lane = 0;
/** [수정] 라인 간격을 3에서 5로 늘렸습니다. **/
const laneWidth = 5; 
let gameState = "ready";

const obstacleModels = ['drone.glb', 'fence.glb', 'box.glb'];

let velocityY = 0;
const gravity = -0.015;
const jumpStrength = 0.4;
let isJumping = false;
let startX = 0, startY = 0;

function init() {
    scene = new THREE.Scene();
    
    const textureLoader = new THREE.TextureLoader();
    textureLoader.load('background.JPG', (texture) => {
        texture.encoding = THREE.sRGBEncoding;
        scene.background = texture;
    });

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    /** [수정] 라인이 넓어진 만큼 시야 확보를 위해 카메라를 조금 더 뒤로 이동시켰습니다 (12 -> 15) **/
    camera.position.set(0, 6, 15);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.DirectionalLight(0xffffff, 0.8);
    light.position.set(5,10,5);
    scene.add(light);
    
    /** [수정] 라인이 넓어졌으므로 바닥 가로 폭을 20에서 30으로 늘렸습니다 **/
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 1000),
        new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.3 })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load('dino.glb', (gltf) => {
        player = gltf.scene;
        player.position.y = 0;
        player.rotation.y = Math.PI;
        scene.add(player);
    });

    window.addEventListener("touchstart", (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });
    window.addEventListener("touchend", handleTouchEnd);
    window.addEventListener("keydown", (e) => {
        if(e.key === "ArrowLeft") lane--;
        if(e.key === "ArrowRight") lane++;
        if(e.code === "Space" || e.key === "ArrowUp") jump();
        lane = Math.max(-1, Math.min(1, lane));
    });

    setInterval(spawnObstacle, 900);
    animate();
}

function handleTouchEnd(e) {
    if(gameState !== "playing") return;
    let diffX = e.changedTouches[0].clientX - startX;
    let diffY = e.changedTouches[0].clientY - startY;
    if (Math.abs(diffX) > Math.abs(diffY)) {
        if(diffX > 30) lane++;
        else if(diffX < -30) lane--;
    } else {
        if(diffY < -30) jump();
    }
    lane = Math.max(-1, Math.min(1, lane));
}

function jump() {
    if(!isJumping && gameState === "playing") {
        velocityY = jumpStrength;
        isJumping = true;
    }
}

function startGame(){
    if(!player) return; 
    document.getElementById("startScreen").style.display = "none";
    gameState = "playing";
}

function restartGame(){ location.reload(); }

function spawnObstacle(){
    if(gameState !== "playing") return;

    const randomModel = obstacleModels[Math.floor(Math.random() * obstacleModels.length)];

    gltfLoader.load(randomModel, (gltf) => {
        const obstacle = gltf.scene.clone(); 
        const lanes = [-laneWidth, 0, laneWidth];
        
        let s = 5.0; 
        let posY = 1.5; 

        if (randomModel === 'drone.glb') {
            s = 2.5;    
            posY = 3.0; 
        } else if (randomModel === 'fence.glb') {
            s = 0.6;    
            posY = 0.5; 
        } else if (randomModel === 'box.glb') {
            s = 0.02;    
            posY = 0.8; 
        }

        obstacle.scale.set(s, s, s);
        
        const randomLaneIndex = Math.floor(Math.random() * 3);
        obstacle.position.set(lanes[randomLaneIndex], posY, -60);
        
        if (randomModel === 'box.glb') {
            obstacle.rotation.y = Math.PI + Math.PI/2; 
        } else {
            obstacle.rotation.y = Math.PI; 
        }
        
        obstacle.userData = { 
            time: Math.random() * 10,
            isDrone: randomModel === 'drone.glb'
        };
        
        scene.add(obstacle);
        obstacles.push(obstacle);
    });
}

function saveScore(s){
    let data = JSON.parse(localStorage.getItem("dinoScores")) || [];
    data.push(s);
    data.sort((a,b)=>b-a);
    data = data.slice(0,5);
    localStorage.setItem("dinoScores", JSON.stringify(data));
}

function showRanking(){
    let data = JSON.parse(localStorage.getItem("dinoScores")) || [];
    let html = "<h2>🏆 RANKING</h2>";
    data.forEach((s,i)=>{ html += `<div>${i+1}위 - ${s}</div>`; });
    document.getElementById("ranking").innerHTML = html;
}

function animate(){
    requestAnimationFrame(animate);

    if(gameState !== "playing"){
        renderer.render(scene, camera);
        return;
    }

    if(player) {
        player.position.x += ((lane * laneWidth) - player.position.x) * 0.15;
        if (isJumping) {
            velocityY += gravity;
            player.position.y += velocityY;
            if (player.position.y <= 0) {
                player.position.y = 0;
                isJumping = false;
                velocityY = 0;
            }
        }
    }

    for(let i=obstacles.length-1; i>=0; i--){
        let o = obstacles[i];
        o.position.z += 0.8; 

        if(o.userData.isDrone) {
            o.userData.time += 0.05;
            o.position.y += Math.sin(o.userData.time) * 0.02; 
        }

        if(player && 
           Math.abs(o.position.z - player.position.z) < 1.1 &&
           Math.abs(o.position.x - player.position.x) < 0.9 &&
           Math.abs(o.position.y - player.position.y) < 1.2) {
            gameState = "over";
            saveScore(score);
            showRanking();
            document.getElementById("finalScore").innerText = "Score: " + score;
            document.getElementById("gameOverScreen").style.display = "flex";
            return;
        }

        if(o.position.z > 15){
            scene.remove(o);
            obstacles.splice(i,1);
            score += 10;
            document.getElementById("score").innerText = "Score: " + score;
        }
    }

    renderer.render(scene, camera);
}

init();
showRanking();

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
