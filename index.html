<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro-Run Mobile</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #3d4d1d; width: 100vw; height: 100vh; image-rendering: pixelated; }
        #ui { position: absolute; top: 40px; width: 100%; text-align: center; color: white; font-size: 24px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        // 모바일 세로 해상도 설정
        canvas.width = 360;
        canvas.height = 640;

        let score = 0;
        let isGameOver = false;
        let obstacles = [];
        let particles = [];
        let gameSpeed = 5;

        // 플레이어 (자이로스피어)
        const player = { x: 180, y: 500, r: 25, lane: 1 }; // lane: 0(왼쪽), 1(중앙), 2(오른쪽)
        const lanes = [60, 180, 300];

        // 티라노 (죽었을 때만 등장)
        const trex = { y: 700, w: 120, h: 80 };

        // 터치 입력 처리 (스와이프)
        let touchStartX = 0;
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
        window.addEventListener('touchend', e => {
            if (isGameOver) { location.reload(); return; }
            let touchEndX = e.changedTouches[0].clientX;
            let diff = touchEndX - touchStartX;
            
            if (Math.abs(diff) > 30) { // 30픽셀 이상 움직였을 때만 스와이프로 인정
                if (diff > 0 && player.lane < 2) player.lane++;
                else if (diff < 0 && player.lane > 0) player.lane--;
            }
        });

        function spawnObstacle() {
            if (isGameOver) return;
            const lane = Math.floor(Math.random() * 3);
            obstacles.push({ x: lanes[lane] - 20, y: -50, w: 40, h: 40 });
            setTimeout(spawnObstacle, 1500 - Math.min(score/10, 800)); // 갈수록 빨리 생성
        }

        function createDeathEffect(x, y) {
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 6 + 2,
                    life: 1.0
                });
            }
        }

        function update() {
            if (isGameOver) return;
            score++;
            ui.innerText = `SCORE: ${Math.floor(score/10)}`;

            // 플레이어 부드러운 이동
            player.x += (lanes[player.lane] - player.x) * 0.2;

            // 장애물 이동 및 충돌
            obstacles.forEach((obs, i) => {
                obs.y += gameSpeed;
                if (obs.y > canvas.height) obstacles.splice(i, 1);
                
                // 충돌 체크
                if (Math.abs(obs.x + 20 - player.x) < 30 && Math.abs(obs.y + 20 - player.y) < 30) {
                    isGameOver = true;
                    createDeathEffect(player.x, player.y);
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 차선 그리기
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.setLineDash([20, 20]);
            lanes.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l, 0); ctx.lineTo(l, canvas.height); ctx.stroke();
            });

            // 장애물 (정글 바위/덤불)
            ctx.fillStyle = "#5d4037";
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

            // 자이로스피어
            if (!isGameOver) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
                ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = "rgba(135, 206, 235, 0.6)"; ctx.fill();
            } else {
                // 티라노가 아래에서 덮치는 연출
                ctx.fillStyle = "#455a64";
                ctx.fillRect(player.x - 60, player.y - 40, 120, 100); 
                ctx.fillStyle = "red"; ctx.fillRect(player.x - 10, player.y - 10, 20, 20); // 입안
            }

            // 피 픽셀 파티클
            particles.forEach((p, i) => {
                ctx.fillStyle = `rgba(255, 0, 0, ${p.life})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });

            if (isGameOver) {
                ctx.fillStyle = "white";
                ctx.font = "30px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2);
                ctx.font = "18px sans-serif";
                ctx.fillText("Tap to Restart", canvas.width/2, canvas.height/2 + 40);
            }

            update();
            requestAnimationFrame(draw);
        }

        spawnObstacle();
        draw();
    </script>
</body>
</html>
