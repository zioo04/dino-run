<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Runner Game</title>
    <style>
        /* 디자인 부분 */
        body { margin: 0; background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        #game-window {
            position: relative; width: 360px; height: 600px;
            background: linear-gradient(#444, #222); border: 4px solid #555; overflow: hidden;
        }

        /* 3개의 레인 가이드 라인 */
        .lane-line { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.1); }
        #line1 { left: 33.33%; }
        #line2 { left: 66.66%; }

        /* 캐릭터 (서브웨이 서퍼즈 스타일) */
        #player {
            position: absolute; bottom: 40px; width: 50px; height: 70px;
            background-color: #00ffcc; border-radius: 10px;
            transition: left 0.15s ease-out; transform: translateX(-50%);
            box-shadow: 0 5px 15px rgba(0,255,204,0.4);
            z-index: 10;
        }

        /* 장애물 */
        .obstacle {
            position: absolute; width: 45px; height: 45px;
            background-color: #ff4444; border-radius: 5px;
            transform: translateX(-50%);
        }

        /* 점수판 */
        #score-board {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 20px; font-weight: bold; z-index: 20;
        }
    </style>
</head>
<body>

    <div id="game-window">
        <div id="score-board">Score: 0</div>
        <div class="lane-line" id="line1"></div>
        <div class="lane-line" id="line2"></div>
        <div id="player" style="left: 50%;"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        const gameWindow = document.getElementById('game-window');
        const scoreBoard = document.getElementById('score-board');
        
        let score = 0;
        let currentLane = 1; // 0:왼쪽, 1:가운데, 2:오른쪽
        const lanePositions = ['16.66%', '50%', '83.33%'];

        // 1. 캐릭터 이동 제어 (A, D 또는 화살표)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                if (currentLane > 0) currentLane--;
            } else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                if (currentLane < 2) currentLane++;
            }
            player.style.left = lanePositions[currentLane];
        });

        // 2. 장애물 생성 및 이동
        function createObstacle() {
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            
            const randomLane = Math.floor(Math.random() * 3);
            obs.style.left = lanePositions[randomLane];
            obs.style.top = '-50px';
            gameWindow.appendChild(obs);

            let topPos = -50;
            const fallSpeed = 5 + (score / 100); // 점수가 높을수록 조금씩 빨라짐

            const moveInterval = setInterval(() => {
                topPos += fallSpeed;
                obs.style.top = topPos + 'px';

                // 충돌 감지
                const playerRect = player.getBoundingClientRect();
                const obsRect = obs.getBoundingClientRect();

                if (
                    obsRect.top < playerRect.bottom &&
                    obsRect.bottom > playerRect.top &&
                    obsRect.left < playerRect.right &&
                    obsRect.right > playerRect.left
                ) {
                    alert("Game Over! 당신의 점수: " + score);
                    location.reload(); // 게임 리셋
                }

                // 화면 밖으로 나가면 삭제 및 점수 획득
                if (topPos > 600) {
                    obs.remove();
                    score += 10;
                    scoreBoard.innerText = "Score: " + score;
                    clearInterval(moveInterval);
                }
            }, 20);
        }

        // 1.5초마다 장애물 생성
        setInterval(createObstacle, 1500);
    </script>
</body>
</html>
