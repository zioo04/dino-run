<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gyrosphere vs T-Rex</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        canvas { background: #4a5d23; border: 4px solid #111; image-rendering: pixelated; width: 100%; max-width: 800px; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 20px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        // 게임 설정 (픽셀 느낌을 위해 낮은 해상도 설정)
        canvas.width = 400;
        canvas.height = 200;

        let score = 0;
        let isGameOver = false;
        let particles = [];

        // 1. 자이로스피어 객체
        const player = {
            x: 100, y: 150, r: 15,
            color: '#87ceeb', // 투명한 하늘색 느낌
            speed: 5,
            targetY: 150
        };

        // 2. 티라노사우루스 (화면 왼쪽 추격자)
        const trex = { x: -40, y: 130, w: 60, h: 40, color: '#455a64' };

        // 3. 장애물 관리
        const obstacles = [];
        function spawnObstacle() {
            if (isGameOver) return;
            obstacles.push({ x: 450, y: 160, w: 15, h: 15, color: '#5d4037' });
            setTimeout(spawnObstacle, 1000 + Math.random() * 2000);
        }

        // 4. 피(픽셀) 파티클 생성 함수
        function createBlood(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 4 + 2,
                    life: 1.0
                });
            }
        }

        // 키 입력 처리
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowUp' && player.y > 50) player.y -= 50;
            if (e.code === 'ArrowDown' && player.y < 150) player.y += 50;
            if (isGameOver && e.code === 'Space') location.reload();
        });

        function update() {
            if (isGameOver) return;

            score++;
            ui.innerText = `SCORE: ${Math.floor(score/10)}`;

            // 장애물 이동 및 충돌 체크
            obstacles.forEach((obs, index) => {
                obs.x -= 4; // 이동 속도

                // 간단한 충돌 판정
                if (obs.x < player.x + player.r && obs.x + obs.w > player.x - player.r &&
                    obs.y < player.y + player.r && obs.y + obs.h > player.y - player.r) {
                    gameOver();
                }

                if (obs.x < -20) obstacles.splice(index, 1);
            });

            // 티라노가 조금씩 다가오는 연출 (실제로는 거리가 좁혀지면 게임오버)
        }

        function gameOver() {
            isGameOver = true;
            createBlood(player.x, player.y);
            // 티라노가 덮치는 연출
            trex.x = player.x - 20; 
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 배경 바닥
            ctx.fillStyle = '#38471a';
            ctx.fillRect(0, 170, canvas.width, 30);

            // 장애물 그리기
            ctx.fillStyle = '#5d4037';
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

            // 티라노사우루스 그리기 (단순 사각형)
            ctx.fillStyle = trex.color;
            ctx.fillRect(trex.x, trex.y, trex.w, trex.h);
            ctx.fillStyle = '#ff0000'; // 티라노 눈
            ctx.fillRect(trex.x + 45, trex.y + 10, 5, 5);

            // 자이로스피어 그리기
            if (!isGameOver) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = 'rgba(135, 206, 235, 0.5)';
                ctx.fill();
            }

            // 피 파티클 그리기
            particles.forEach((p, index) => {
                ctx.fillStyle = `rgba(255, 0, 0, ${p.life})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(index, 1);
            });

            if (isGameOver) {
                ctx.fillStyle = "white";
                ctx.font = "20px 'Courier New'";
                ctx.fillText("GAME OVER - Press Space", 70, 100);
            }

            update();
            requestAnimationFrame(draw);
        }

        spawnObstacle();
        draw();
    </script>
</body>
</html>
