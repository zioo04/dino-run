<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Mobile Runner: T-Rex Escape</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; z-index: 100; }
        #score { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <div id="score">Score: 0</div>
        <div style="background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 20px;">
            🦖 나무를 피해 티라노로부터 도망치세요!
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, trex;
        let obstacles = [];
        let score = 0;
        let currentLane = 0; 
        const laneWidth = 3;
        let touchStartX = 0;

        const textureLoader = new THREE.TextureLoader();
        
        // --- [확인된 파일 형식으로 정확히 수정] ---
        const playerTexture = textureLoader.load('player_texture.PNG'); // 대문자
        const treeTexture1 = textureLoader.load('tree_texture1.png');   // 소문자
        const treeTexture2 = textureLoader.load('tree_texture2.png');   // 소문자
        const trexTexture = textureLoader.load('trex_texture.PNG');     // 대문자

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 15, 65);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 12); 
            camera.lookAt(0, 2, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x505050));

            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(12, 1000),
                new THREE.MeshStandardMaterial({ color: 0x111111 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 플레이어 설정
            const playerMat = new THREE.MeshStandardMaterial({ 
                map: playerTexture, transparent: true, alphaTest: 0.5, side: THREE.DoubleSide 
            });
            player = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 4), playerMat);
            player.position.y = 2; 
            scene.add(player);

            // 공룡 설정 (조정된 사이즈와 위치)
            const trexMat = new THREE.MeshStandardMaterial({ 
                map: trexTexture, transparent: true, alphaTest: 0.5, side: THREE.DoubleSide 
            });
            trex = new THREE.Mesh(new THREE.PlaneGeometry(10, 15), trexMat);
            trex.position.set(0, -3, 10.5); 
            trex.rotation.x = -Math.PI / 8; 
            scene.add(trex);

            // 터치 컨트롤
            window.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, false);
            window.addEventListener('touchend', (e) => {
                let diff = e.changedTouches[0].clientX - touchStartX;
                if (diff < -30 && currentLane > -1) currentLane--; 
                else if (diff > 30 && currentLane < 1) currentLane++; 
            }, false);

            animate();
            setInterval(spawnTree, 1200);
        }

        function spawnTree() {
            const isTree1 = Math.random() > 0.5;
            const treeMat = new THREE.MeshStandardMaterial({ 
                map: isTree1 ? treeTexture1 : treeTexture2,
                transparent: true,
                alphaTest: 0.5,
                side: THREE.DoubleSide
            });
            
            const tree = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 4.5), treeMat);
            const lanes = [-laneWidth, 0, laneWidth];
            tree.position.set(lanes[Math.floor(Math.random() * 3)], 2.25, -60);
            
            scene.add(tree);
            obstacles.push(tree);
        }

        function animate() {
            requestAnimationFrame(animate);

            const targetX = currentLane * laneWidth;
            player.position.x += (targetX - player.position.x) * 0.2;
            trex.position.x += (player.position.x - trex.position.x) * 0.05;

            const dist = Math.max(10.5 - (score / 600), 6);
            trex.position.z = dist;

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += 0.7;

                if (Math.abs(obstacles[i].position.z - player.position.z) < 1.0 && 
                    Math.abs(obstacles[i].position.x - player.position.x) < 1.5) {
                    alert("나무에 부딪혔습니다! 점수: " + score);
                    location.reload();
                    return;
                }

                if (obstacles[i].position.z > 15) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            }
            renderer.render(scene, camera);
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
