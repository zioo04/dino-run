<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gyrosphere Jungle Run - Game Over</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: 'Courier New', Courier, monospace; }
        #gameContainer { position: relative; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { background: #2a3d53; /* 밤 정글 하늘색 */ image-rendering: pixelated; }
        #ui { position: absolute; top: 15px; left: 0; width: 100%; text-align: center; font-size: 18px; text-shadow: 2px 2px #000; font-weight: bold; pointer-events: none;}
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">SCORE: 000000</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        // 게임 해상도 설정 (픽셀 느낌 강조)
        canvas.width = 480; // 조금 더 넓게
        canvas.height = 270; // 16:9 비율

        let score = 0;
        let isGameOver = false;
        let gameSpeed = 3;
        let particles = [];
        let frameCount = 0;

        // 1. 자이로스피어 (플레이어) - 이미지 기반 디자인
        const player = {
            x: 120, y: 190, r: 18,
            color: '#3498db', // 파란색 테두리
            innerColor: 'rgba(200, 230, 255, 0.6)', // 반투명 내부
            speed: 5, targetY: 190, laneY: [90, 190], currentLane: 1
        };

        // 2. 티라노사우루스 - 이미지 기반 색상 및 형태
        const trex = { 
            x: -60, y: 150, w: 90, h: 60, 
            color: '#556b2f', // 올리브 그린
            bellyColor: '#8fbc8f', 
            eyeColor: '#ff4444',
            biteX: 0 // 게임오버 시 깨무는 위치
        };

        // 3. 장애물 (통나무)
        const obstacles = [];
        function spawnObstacle() {
            if (isGameOver) return;
            const lane = Math.floor(Math.random() * 2);
            obstacles.push({ 
                x: canvas.width + 20, 
                y: player.laneY[lane] + 5, 
                w: 20, h: 20, color: '#654321' 
            });
            // 속도에 따라 생성 간격 조절
            setTimeout(spawnObstacle, (2000 / (gameSpeed/3)) + Math.random() * 1500);
        }

        // 4. 피 및 유리 파편 파티클 (강화됨)
        function createDeathParticles(x, y) {
            // 피 (빨간색)
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: x + (Math.random()-0.5)*20, y: y + (Math.random()-0.5)*20,
                    vx: (Math.random() - 0.3) * 7, vy: (Math.random() - 0.7) * 8, // 위/앞으로 튀게
                    size: Math.random() * 4 + 2, color: '#cc0000', life: 1.0, gravity: 0.3
                });
            }
            // 유리 파편 (흰색/하늘색)
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
                    size: Math.random() * 3 + 1, color: '#e0f7fa', life: 0.8, gravity: 0.2
                });
            }
        }

        // 키 입력
        window.addEventListener('keydown', (e) => {
            if (isGameOver) {
                if (e.code === 'Space') location.reload();
                return;
            }
            if (e.code === 'ArrowUp') player.targetY = player.laneY[0];
            if (e.code === 'ArrowDown') player.targetY = player.laneY[1];
        });

        function update() {
            if (isGameOver) return;
            frameCount++;
            
            // 점수 및 속도 증가
            score++;
            gameSpeed = 3 + (score / 2000); 
            let displayScore = String(Math.floor(score/10)).padStart(6, '0');
            ui.innerText = `SCORE: ${displayScore}`;

            // 플레이어 이동 (부드럽게)
            player.y += (player.targetY - player.y) * 0.2;

            // 장애물 이동 및 충돌
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;
                // 충돌 판정 (자이로스피어 중심 기준)
                if (obs.x < player.x + player.r && obs.x + obs.w > player.x - player.r &&
                    obs.y < player.y + player.r && obs.y + obs.h > player.y - player.r) {
                    gameOver();
                }
                if (obs.x < -30) obstacles.splice(index, 1);
            });
        }

        function gameOver() {
            isGameOver = true;
            createDeathParticles(player.x, player.y);
            // 티라노가 플레이어를 깨무는 연출
            trex.x = player.x - trex.w + 10; 
            trex.y = player.y - trex.h/2;
        }

        function drawPixelCircle(x, y, r, color, lineWidth=2) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
        }

        function drawJungleBackground() {
            // 어두운 바닥 (이미지 흙색)
            ctx.fillStyle = '#3e2723';
            ctx.fillRect(0, 210, canvas.width, 60);
            // 풀 한 줄 (이미지 녹색)
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(0, 210, canvas.width, 8);

            // 단순화된 정글 실루엣 (단색 사각형으로 무성함 표현)
            ctx.fillStyle = '#1a2a1a'; // 아주 어두운 녹색
            ctx.fillRect(30, 80, 40, 130); ctx.fillRect(100, 60, 50, 150);
            ctx.fillRect(200, 90, 30, 120); ctx.fillRect(280, 50, 60, 160);
            ctx.fillRect(380, 100, 40, 110);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawJungleBackground();

            // 장애물 그리기
            ctx.fillStyle = '#654321';
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.w, obs.h));

            // 티라노사우루스 그리기 (사각형 조합으로 이미지 실루엣 흉내)
            ctx.fillStyle = trex.color;
            // 몸통
            ctx.fillRect(trex.x, trex.y + 15, trex.w - 15, trex.h - 15);
            // 머리 (입 벌린 사각형)
            ctx.fillRect(trex.x + trex.w - 25, trex.y, 30, 25); // 상악
            ctx.fillRect(trex.x + trex.w - 25, trex.y + 30, 30, 15); // 하악
            // 눈 (이미지처럼 빨간색)
            ctx.fillStyle = trex.eyeColor;
            ctx.fillRect(trex.x + trex.w - 15, trex.y + 8, 4, 4);

            // 자이로스피어 그리기 (이미지 기반)
            if (!isGameOver) {
                // 내부 (반투명)
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.r-lineWidth=2, 0, Math.PI * 2);
                ctx.fillStyle = player.innerColor;
                ctx.fill();
                // 운전석 표현 (작은 픽셀 사각형)
                ctx.fillStyle = '#333'; ctx.fillRect(player.x-4, player.y-2, 8, 8);
                // 테두리
                drawPixelCircle(player.x, player.y, player.r, player.color, 3);
            }

            // 파티클 그리기 (피, 유리)
            particles.forEach((p, index) => {
                ctx.fillStyle = `rgba(${parseInt(p.color.slice(1,3),16)}, ${parseInt(p.color.slice(3,5),16)}, ${parseInt(p.color.slice(5,7),16)}, ${p.life})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.x += p.vx; p.y += p.vy; p.vy += p.gravity; // 중력 적용
                p.life -= 0.015;
                if (p.life <= 0) particles.splice(index, 1);
            });

            // GAME OVER UI (이미지 기반)
            if (isGameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; // 배경 약간 어둡게
                ctx.fillRect(0,0,canvas.width, canvas.height);

                // 대형 빨간색 GAME OVER (이미지처럼)
                ctx.fillStyle = "#ff4444";
                ctx.font = "bold 40px 'Courier New'";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 10);

                // 하단 PRESS SPACE...
                ctx.fillStyle = "white";
                ctx.font = "1
