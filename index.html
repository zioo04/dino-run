<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dino Runner Portfolio</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0f172a;
    font-family: sans-serif;
}

#ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 10;
}

#score {
    font-size: 28px;
    font-weight: bold;
}

#ranking {
    position: absolute;
    top: 120px;
    width: 100%;
    text-align: center;
    color: white;
}

.badge {
    display: inline-block;
    padding: 6px 14px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    margin-top: 8px;
}
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div class="badge">🦖 Dino Runner Portfolio Project</div>
</div>

<div id="ranking"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// =====================
// 기본 세팅
// =====================
let scene, camera, renderer;
let player, obstacles = [];
let score = 0;
let lane = 0;
const laneWidth = 3;
let gameState = "playing";

// =====================
// 초기화
// =====================
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 10, 60);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 7, 12);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // light
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,10,5);
    scene.add(light);

    // floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 1000),
        new THREE.MeshStandardMaterial({ color: 0x1e293b })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // player
    player = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 1.5, 1.5),
        new THREE.MeshStandardMaterial({ color: 0x22c55e })
    );
    player.position.y = 1;
    scene.add(player);

    // controls
    window.addEventListener("touchstart", e => startX = e.touches[0].clientX);
    window.addEventListener("touchend", movePlayer);

    window.addEventListener("keydown", (e)=>{
        if(e.key === "ArrowLeft") lane--;
        if(e.key === "ArrowRight") lane++;
        lane = Math.max(-1, Math.min(1, lane));
    });

    setInterval(spawnObstacle, 900);
    animate();
}

// =====================
// 장애물 생성
// =====================
function spawnObstacle() {
    if(gameState !== "playing") return;

    const box = new THREE.Mesh(
        new THREE.BoxGeometry(1.5,1.5,1.5),
        new THREE.MeshStandardMaterial({ color: 0xef4444 })
    );

    const lanes = [-laneWidth,0,laneWidth];
    box.position.set(lanes[Math.floor(Math.random()*3)],1,-50);

    scene.add(box);
    obstacles.push(box);
}

// =====================
// 점수 저장 (DB 역할)
// =====================
function saveScore(s) {
    let data = JSON.parse(localStorage.getItem("dinoScores")) || [];
    data.push(s);
    data.sort((a,b)=>b-a);
    data = data.slice(0,5);
    localStorage.setItem("dinoScores", JSON.stringify(data));
}

// =====================
// 랭킹 표시
// =====================
function showRanking() {
    let data = JSON.parse(localStorage.getItem("dinoScores")) || [];

    let html = "<h2>🏆 Ranking</h2>";

    if(data.length === 0){
        html += "<div>기록 없음</div>";
    }

    data.forEach((s,i)=>{
        html += `<div>${i+1}위 - ${s}</div>`;
    });

    document.getElementById("ranking").innerHTML = html;
}

// =====================
// 게임 루프
// =====================
function animate() {
    requestAnimationFrame(animate);

    if(gameState !== "playing"){
        renderer.render(scene,camera);
        return;
    }

    // player move
    player.position.x += ((lane * laneWidth) - player.position.x) * 0.2;

    // obstacles
    for(let i=obstacles.length-1;i>=0;i--){
        let o = obstacles[i];
        o.position.z += 0.7;

        // collision
        if(Math.abs(o.position.z - player.position.z) < 1 &&
           Math.abs(o.position.x - player.position.x) < 1){

            gameState = "gameover";
            saveScore(score);
            showRanking();
            return;
        }

        if(o.position.z > 10){
            scene.remove(o);
            obstacles.splice(i,1);

            score += 10;
            document.getElementById("score").innerText = "Score: " + score;
        }
    }

    renderer.render(scene,camera);
}

// =====================
// 모바일 이동
// =====================
let startX = 0;
function movePlayer(e){
    let diff = e.changedTouches[0].clientX - startX;

    if(diff > 30) lane++;
    else if(diff < -30) lane--;

    lane = Math.max(-1, Math.min(1, lane));
}

// start
init();

window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
