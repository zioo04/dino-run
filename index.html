 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jurassic Escape Full</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #222; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
    // 화면 크기를 자동으로 계산합니다.
    const screenWidth = window.innerWidth;
    const screenHeight = window.innerHeight;

    const config = {
        type: Phaser.AUTO,
        width: screenWidth,
        height: screenHeight,
        physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
        scene: { preload: preload, create: create, update: update }
    };

    let player, tRex, cursors, obstacles, score = 0, scoreText;
    const game = new Phaser.Game(config);

    function preload() {
        this.load.image('ball', 'https://labs.phaser.io/assets/sprites/pangball.png');
        this.load.image('trex', 'https://labs.phaser.io/assets/sprites/phaser-dude.png');
        this.load.image('obs', 'https://labs.phaser.io/assets/sprites/block.png');
    }

    function create() {
        // 플레이어를 화면 아래쪽에 배치
        player = this.physics.add.sprite(screenWidth / 2, screenHeight * 0.75, 'ball');
        player.setScale(2.5); // 플레이어 크기 확대
        player.setCollideWorldBounds(true);
        
        // 티라노 위치 조정
        tRex = this.add.sprite(screenWidth / 2, screenHeight * 0.9, 'trex');
        tRex.setScale(3); // 티라노 크기 확대
        tRex.setTint(0xff0000);

        obstacles = this.physics.add.group();
        this.time.addEvent({ delay: 800, callback: addObstacle, callbackScope: this, loop: true });

        scoreText = this.add.text(20, 40, 'Score: 0', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' });

        this.physics.add.overlap(player, obstacles, gameOver, null, this);
    }

    function update() {
        // 조작 방식 (터치 위치에 따라 이동)
        if (this.input.activePointer.isDown) {
            if (this.input.activePointer.x < screenWidth / 2) {
                player.setVelocityX(-400); // 속도 증가
            } else {
                player.setVelocityX(400);
            }
        } else {
            player.setVelocityX(0);
        }

        tRex.x = player.x; // 추적 효과
        score += 1;
        scoreText.setText('Score: ' + score);
    }

    function addObstacle() {
        let x = Phaser.Math.Between(50, screenWidth - 50);
        let obstacle = obstacles.create(x, -50, 'obs');
        obstacle.setScale(2.5); // 장애물 크기 확대
        obstacle.setVelocityY(450 + (score / 15)); // 속도감 있게 조정
    }

    function gameOver() {
        this.physics.pause();
        const overText = this.add.text(screenWidth / 2, screenHeight / 2, 'GAME OVER', { fontSize: '60px', fill: '#ff0000', fontStyle: 'bold' }).setOrigin(0.5);
        this.time.delayedCall(2000, () => location.reload(), [], this);
    }
</script>
</body>
</html>
